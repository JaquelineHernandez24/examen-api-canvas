<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Art</title>

    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/img/favicon.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark text-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black px-3">
    <span class="navbar-brand mb-0 h1">Canvas Art</span>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- CANVAS -->
        <div class="col-md-6">
            <div class="card bg-secondary">
                <div class="card-header fw-bold">Imagen Dibujada con Canvas 2D</div>
                <div class="card-body text-center">
                    <canvas id="canvas" width="750" height="500"></canvas>
                </div>
            </div>
        </div>

        <!-- ORIGINAL -->
        <div class="col-md-6">
            <div class="card bg-secondary">
                <div class="card-header fw-bold">Imagen Original</div>
                <div class="card-body text-center">
                    <img src="assets/img/imagen.jpg" class="img-fluid rounded shadow">
                </div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="text-center mt-4 p-3 bg-black text-light">
    © 2024 - Programado por [TU NOMBRE]
</footer>

<script src="assets/js/main.js"></script>

</body>
</html>
